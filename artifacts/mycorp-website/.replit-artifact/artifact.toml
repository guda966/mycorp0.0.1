kind = "web"
previewPath = "/"
title = "MyCorp Solutions"
version = "1.0.0"
id = "artifacts/mycorp-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21390

[services.development]
run = "pnpm --filter @workspace/mycorp-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mycorp-website", "run", "build" ]
publicDir = "artifacts/mycorp-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21390"
BASE_PATH = "/"
